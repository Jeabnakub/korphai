  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzEaLIqV3CwkQW337xsjEIjfDHjUi6xk2aK4OlHka3zzMHfq9soA8255kwERFGGGn7H/exec';
    
    // Default config
    const defaultConfig = {
      system_title: 'ระบบจัดเก็บสถิติและปัญหากอไผ่'
    };

    let currentSearchResult = null;

    // Initialize Lucide icons
    lucide.createIcons();

    // Initialize Element SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          document.getElementById('system-title').textContent = config.system_title || defaultConfig.system_title;
        },
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['system_title', config.system_title || defaultConfig.system_title]
        ])
      });
    }

    // Tab switching
    function switchTab(tab) {
      const tabAdd = document.getElementById('tab-add');
      const tabSearch = document.getElementById('tab-search');
      const sectionAdd = document.getElementById('section-add');
      const sectionSearch = document.getElementById('section-search');

      if (tab === 'add') {
        tabAdd.className = 'flex-1 py-3 px-4 rounded-xl font-semibold transition-all flex items-center justify-center gap-2 bg-green-600 text-white tab-btn active';
        tabSearch.className = 'flex-1 py-3 px-4 rounded-xl font-semibold transition-all flex items-center justify-center gap-2 text-gray-600 hover:bg-gray-100 tab-btn';
        sectionAdd.classList.remove('hidden');
        sectionSearch.classList.add('hidden');
      } else {
        tabSearch.className = 'flex-1 py-3 px-4 rounded-xl font-semibold transition-all flex items-center justify-center gap-2 bg-red-600 text-white tab-btn active';
        tabAdd.className = 'flex-1 py-3 px-4 rounded-xl font-semibold transition-all flex items-center justify-center gap-2 text-gray-600 hover:bg-gray-100 tab-btn';
        sectionSearch.classList.remove('hidden');
        sectionAdd.classList.add('hidden');
      }
      lucide.createIcons();
    }

    // Format date to Thai - handle both YYYY-MM-DD and ISO 8601 formats
    function formatThaiDate(dateStr) {
      if (!dateStr || typeof dateStr !== 'string') return '-';
      
      const thaiMonths = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 
                         'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
      
      // If already in Thai format, return as-is
      if (thaiMonths.some(m => dateStr.includes(m))) return dateStr;
      
      // Extract YYYY-MM-DD from both formats (YYYY-MM-DD or ISO 8601)
      const match = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (match) {
        let year = parseInt(match[1], 10);
        const month = parseInt(match[2], 10);
        const day = parseInt(match[3], 10);
        
        // Validate ranges
        if (year >= 1900 && year <= 3000 && month >= 1 && month <= 12 && day >= 1 && day <= 31) {
          const thaiMonth = thaiMonths[month - 1];
          
          // If year is already in Thai Buddhist Era (> 2400), use as-is
          if (year > 2400) {
            return `${day} ${thaiMonth} ${year}`;
          } else {
            // Convert to Thai Buddhist Era (add 543)
            const thaiYear = year + 543;
            return `${day} ${thaiMonth} ${thaiYear}`;
          }
        }
      }
      
      return dateStr;
    }

    // Get current Thai datetime
    function getCurrentThaiDateTime() {
      const now = new Date();
      const thaiMonths = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 
                         'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
      const day = now.getDate();
      const month = thaiMonths[now.getMonth()];
      const year = now.getFullYear() + 543;
      const hours = now.getHours().toString().padStart(2, '0');
      const minutes = now.getMinutes().toString().padStart(2, '0');
      const seconds = now.getSeconds().toString().padStart(2, '0');
      return `${day} ${month} ${year} เวลา ${hours}:${minutes}:${seconds} น.`;
    }

    // Get status badge color
    function getStatusBadgeClass(status) {
      const statusColors = {
        'อยู่ระหว่างตรวจสอบข้อมูล': 'bg-yellow-100 text-yellow-800',
        'อยู่ระหว่างประสานงานผู้แจ้ง': 'bg-blue-100 text-blue-800',
        'อยู่ระหว่างประสานงาน OS': 'bg-purple-100 text-purple-800',
        'อยู่ระหว่างเสนอหนังสือพิจารณา/อนุมัติ': 'bg-orange-100 text-orange-800',
        'ส่งต่อกลุ่มงานอื่นๆ ที่เกี่ยวข้อง': 'bg-indigo-100 text-indigo-800',
        'ดำเนินการเสร็จสิ้น/ปิดเคส': 'bg-green-100 text-green-800'
      };
      return statusColors[status] || 'bg-gray-100 text-gray-800';
    }

    // JSONP callback counter
    let jsonpCallbackId = 0;

    // Send data via JSONP
    function sendJsonp(url, data) {
      return new Promise((resolve, reject) => {
        const callbackName = `jsonpCallback_${Date.now()}_${jsonpCallbackId++}`;
        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error('Request timeout'));
        }, 30000);

        window[callbackName] = (response) => {
          cleanup();
          resolve(response);
        };

        function cleanup() {
          clearTimeout(timeout);
          delete window[callbackName];
          const script = document.getElementById(callbackName);
          if (script) script.remove();
        }

        const params = new URLSearchParams(data);
        params.append('callback', callbackName);

        const script = document.createElement('script');
        script.id = callbackName;
        script.src = `${url}?${params.toString()}`;
        script.onerror = () => {
          cleanup();
          reject(new Error('Network error'));
        };
        document.body.appendChild(script);
      });
    }

    // Form submission
    document.getElementById('data-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const receiveDateValue = document.getElementById('receive-date').value;
      const thaiDate = formatThaiDate(receiveDateValue);

      const formData = {
        action: 'create',
        docNumber: document.getElementById('doc-number').value,
        receiveDate: thaiDate,
        staffName: document.getElementById('staff-name').value,
        problemType: document.getElementById('problem-type').value,
        problemDetail: document.getElementById('problem-detail').value,

        });
        return;
      }

      const confirmResult = await Swal.fire({
        icon: 'question',
        title: 'ยืนยันการแก้ไข',

      });

      Swal.fire({
        title: 'กำลังบันทึกการแก้ไข...',
        html: '<div class="flex justify-center"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-600"></div></div>',

          docNumber: currentSearchResult.docNumber,
          status: newStatus,

            icon: 'success',
